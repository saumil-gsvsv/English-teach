<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&family=Baloo+Bhai+2:wght@600;800&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --dark: #1C2B2D;
  --green: #2D5016;
  --olive: #4A6741;
  --amber: #D4A017;
  --rust: #C4622D;
  --yellow: #E8C547;
  --sage: #8BAF7A;
  --white: #FFFFFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  position: relative;
  overflow-x: hidden;
}

/* Decorative blobs like the reference */
body::before {
  content: '';
  position: fixed;
  top: -80px; right: -80px;
  width: 320px; height: 320px;
  background: var(--yellow);
  border-radius: 50%;
  opacity: 0.18;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -60px; left: -60px;
  width: 240px; height: 240px;
  background: var(--rust);
  border-radius: 50%;
  opacity: 0.12;
  z-index: 0;
}

.page-wrapper {
  width: 100%;
  max-width: 560px;
  position: relative;
  z-index: 1;
}

/* Top nav bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--dark);
  letter-spacing: -0.5px;
}
.logo span {
  background: var(--dark);
  color: var(--cream);
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 2px;
}
.score-pill {
  background: var(--dark);
  color: var(--cream);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
}

/* Progress */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.progress-track {
  flex: 1;
  height: 7px;
  background: rgba(28,43,45,0.12);
  border-radius: 50px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--dark);
  border-radius: 50px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}
.progress-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--dark);
  opacity: 0.5;
  white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}

/* Hero card — dark green like reference header */
.question-card {
  background: var(--dark);
  border-radius: 28px;
  padding: 36px 32px 32px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.question-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  border: 3px solid rgba(255,255,255,0.08);
  border-radius: 50%;
}
.question-card::after {
  content: '';
  position: absolute;
  bottom: -30px; left: 30px;
  width: 100px; height: 100px;
  border: 3px solid rgba(232,197,71,0.2);
  border-radius: 50%;
}

.q-tag {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 50px;
  margin-bottom: 18px;
  font-family: 'DM Sans', sans-serif;
}

.question-text {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.35;
  position: relative;
  z-index: 1;
}

/* Options grid — cream cards like reference sections */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.option-btn {
  background: var(--white);
  border: 2px solid transparent;
  border-radius: 18px;
  padding: 18px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  cursor: pointer;
  transition: all 0.22s ease;
  text-align: center;
  box-shadow: 0 2px 8px rgba(28,43,45,0.07);
  position: relative;
  overflow: hidden;
}
.option-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--yellow);
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: 16px;
}
.option-btn:hover { border-color: var(--dark); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(28,43,45,0.12); }
.option-btn:hover::after { opacity: 0.15; }

.option-btn.correct {
  background: var(--olive);
  color: var(--white);
  border-color: var(--olive);
  animation: bumpUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.option-btn.wrong {
  background: var(--rust);
  color: var(--white);
  border-color: var(--rust);
  animation: wiggle 0.4s ease;
}
@keyframes bumpUp { 0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)} }
@keyframes wiggle { 0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)} }

/* Answer section */
.answer-card {
  background: var(--white);
  border-radius: 22px;
  padding: 22px 24px;
  box-shadow: 0 2px 12px rgba(28,43,45,0.07);
  margin-bottom: 14px;
}
.answer-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--dark);
  opacity: 0.45;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
  font-family: 'DM Sans', sans-serif;
}
.answer-row {
  display: flex;
  gap: 10px;
}
.answer-input {
  flex: 1;
  background: var(--cream);
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 12px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--dark);
  outline: none;
  transition: border-color 0.2s;
}
.answer-input::placeholder { color: rgba(28,43,45,0.3); }
.answer-input:focus { border-color: var(--dark); }
.answer-input.correct { border-color: var(--olive); background: rgba(74,103,65,0.08); }
.answer-input.wrong   { border-color: var(--rust);  background: rgba(196,98,45,0.08); }

.check-btn {
  background: var(--dark);
  color: var(--white);
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.check-btn:hover { background: var(--olive); transform: translateY(-2px); }
.check-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Feedback */
.feedback {
  margin-top: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  display: none;
  font-family: 'DM Sans', sans-serif;
}
.feedback.show { display: block; animation: fadeUp 0.3s ease; }
.feedback.correct-fb { background: rgba(74,103,65,0.12); color: var(--olive); border: 1.5px solid rgba(74,103,65,0.25); }
.feedback.wrong-fb   { background: rgba(196,98,45,0.1);  color: var(--rust);  border: 1.5px solid rgba(196,98,45,0.25); }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Next button — amber/yellow like reference CTA */
.next-btn {
  width: 100%;
  background: var(--yellow);
  color: var(--dark);
  border: none;
  border-radius: 18px;
  padding: 17px;
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  display: none;
  transition: all 0.22s;
  box-shadow: 0 4px 16px rgba(212,160,23,0.3);
  letter-spacing: 0.2px;
}
.next-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(212,160,23,0.4); }
.next-btn.show { display: block; animation: fadeUp 0.4s cubic-bezier(0.34,1.56,0.64,1); }

/* Tags row at bottom like reference */
.tag-row {
  display: flex;
  gap: 8px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.tag {
  background: rgba(28,43,45,0.08);
  color: var(--dark);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
}
</style>
</head>
<body>

<div class="page-wrapper">
  <div class="topbar">
    <div class="logo">Verb<span>Quiz</span></div>
    <div class="score-pill" id="score-box">Score: 0 / 50</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress" style="width:2%"></div>
    </div>
    <div class="progress-label" id="q-label">1 / 50</div>
  </div>

  <div class="question-card">
    <div class="q-tag">🔤 Gujarati → English</div>
    <div class="question-text" id="question">Loading...</div>
  </div>

  <div class="options-grid" id="options"></div>

  <div class="answer-card">
    <div class="answer-label">✏️ તમારો જવાબ English માં લખો</div>
    <div class="answer-row">
      <input type="text" class="answer-input" id="answer-input" placeholder="Type English answer...">
      <button class="check-btn" id="check-btn" onclick="checkAnswer()">ચકાસો</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQuestion()">આગળ જાઓ →</button>

  <div class="tag-row">
    <span class="tag">ગુજરાતી</span>
    <span class="tag">English Verbs</span>
    <span class="tag">Self Learning</span>
  </div>
</div>

<script>
const allVerbs = [
  { verb:"Run",      gu:"દોડવું",      wrong:["Jump","Walk","Swim"] },
  { verb:"Walk",     gu:"ચાલવું",      wrong:["Run","Sit","Sleep"] },
  { verb:"Eat",      gu:"ખાવું",       wrong:["Drink","Cook","Smell"] },
  { verb:"Drink",    gu:"પીવું",       wrong:["Eat","Pour","Wash"] },
  { verb:"Sleep",    gu:"સૂવું",       wrong:["Sit","Rest","Lie"] },
  { verb:"Read",     gu:"વાંચવું",     wrong:["Write","Study","Teach"] },
  { verb:"Write",    gu:"લખવું",       wrong:["Read","Draw","Paint"] },
  { verb:"Speak",    gu:"બોલવું",      wrong:["Listen","Sing","Shout"] },
  { verb:"Listen",   gu:"સાંભળવું",    wrong:["Speak","Hear","Watch"] },
  { verb:"See",      gu:"જોવું",       wrong:["Look","Watch","Find"] },
  { verb:"Play",     gu:"રમવું",       wrong:["Dance","Sing","Jump"] },
  { verb:"Jump",     gu:"કૂદવું",      wrong:["Run","Hop","Fall"] },
  { verb:"Sing",     gu:"ગાવું",       wrong:["Dance","Play","Speak"] },
  { verb:"Dance",    gu:"નૃત્ય કરવું", wrong:["Sing","Jump","Play"] },
  { verb:"Swim",     gu:"તરવું",       wrong:["Run","Dive","Walk"] },
  { verb:"Laugh",    gu:"હસવું",       wrong:["Cry","Smile","Shout"] },
  { verb:"Cry",      gu:"રડવું",       wrong:["Laugh","Scream","Sob"] },
  { verb:"Think",    gu:"વિચારવું",    wrong:["Know","Feel","Guess"] },
  { verb:"Know",     gu:"જાણવું",      wrong:["Think","Learn","Find"] },
  { verb:"Learn",    gu:"શીખવું",      wrong:["Teach","Study","Know"] },
  { verb:"Teach",    gu:"શીખવાડવું",   wrong:["Learn","Study","Guide"] },
  { verb:"Open",     gu:"ખોલવું",      wrong:["Close","Lock","Shut"] },
  { verb:"Close",    gu:"બંધ કરવું",   wrong:["Open","Lock","Seal"] },
  { verb:"Bring",    gu:"લાવવું",      wrong:["Take","Give","Carry"] },
  { verb:"Take",     gu:"લેવું",       wrong:["Give","Bring","Hold"] },
  { verb:"Give",     gu:"આપવું",       wrong:["Take","Send","Keep"] },
  { verb:"Make",     gu:"બનાવવું",     wrong:["Do","Create","Build"] },
  { verb:"Do",       gu:"કરવું",       wrong:["Make","Act","Perform"] },
  { verb:"Help",     gu:"મદદ કરવી",    wrong:["Support","Give","Save"] },
  { verb:"Use",      gu:"વાપરવું",     wrong:["Make","Hold","Try"] },
  { verb:"Buy",      gu:"ખરીદવું",     wrong:["Sell","Pay","Order"] },
  { verb:"Sell",     gu:"વેચવું",      wrong:["Buy","Give","Trade"] },
  { verb:"Work",     gu:"કામ કરવું",   wrong:["Play","Study","Rest"] },
  { verb:"Study",    gu:"અભ્યાસ કરવો", wrong:["Read","Learn","Write"] },
  { verb:"Clean",    gu:"સાફ કરવું",   wrong:["Wash","Wipe","Sweep"] },
  { verb:"Wash",     gu:"ધોવું",       wrong:["Clean","Rinse","Dry"] },
  { verb:"Cook",     gu:"રાંધવું",     wrong:["Eat","Bake","Fry"] },
  { verb:"Drive",    gu:"ગાડી ચલાવવી", wrong:["Ride","Travel","Steer"] },
  { verb:"Travel",   gu:"પ્રવાસ કરવો", wrong:["Drive","Move","Go"] },
  { verb:"Wait",     gu:"રાહ જોવી",    wrong:["Stay","Sit","Stop"] },
  { verb:"Meet",     gu:"મળવું",       wrong:["See","Visit","Greet"] },
  { verb:"Call",     gu:"ફોન કરવો",    wrong:["Meet","Text","Shout"] },
  { verb:"Ask",      gu:"પૂછવું",      wrong:["Answer","Tell","Say"] },
  { verb:"Answer",   gu:"જવાબ આપવો",   wrong:["Ask","Reply","Speak"] },
  { verb:"Start",    gu:"શરૂ કરવું",   wrong:["Finish","Begin","Open"] },
  { verb:"Finish",   gu:"પૂર્ણ કરવું", wrong:["Start","End","Stop"] },
  { verb:"Remember", gu:"યાદ કરવું",   wrong:["Forget","Think","Know"] },
  { verb:"Forget",   gu:"ભૂલવું",      wrong:["Remember","Lose","Miss"] },
  { verb:"Enjoy",    gu:"આનંદ માણવો",  wrong:["Love","Like","Play"] },
  { verb:"Find",     gu:"શોધવું",      wrong:["Lose","Keep","Get"] }
];

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

const questions = shuffle(allVerbs).slice(0,50).map(v => {
  const opts = shuffle([v.verb, ...v.wrong.slice(0,3)]);
  return {
    question: `'${v.gu}' ક્રિયાપદનો સાચો English અર્થ કયો છે?`,
    options: opts,
    correct: opts.indexOf(v.verb),
    correctWord: v.verb,
    explanation: `✅ સાચો જવાબ: ${v.verb} = ${v.gu}`
  };
});

let current=0, score=0, answered=false;

function loadQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('q-label').textContent=`${current+1} / 50`;
  document.getElementById('progress').style.width=((current+1)/50*100)+'%';
  document.getElementById('score-box').textContent=`Score: ${score} / 50`;
  document.getElementById('question').textContent=q.question;

  const optEl=document.getElementById('options');
  optEl.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=opt;
    btn.onclick=()=>selectOption(i,btn);
    optEl.appendChild(btn);
  });

  const inp=document.getElementById('answer-input');
  inp.value=''; inp.className='answer-input'; inp.disabled=false;
  document.getElementById('check-btn').disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';
}

function selectOption(index,btn){
  if(answered)return;
  const q=questions[current];
  document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');
  if(index===q.correct){
    btn.classList.add('correct'); score++;
    showFeedback(true,q.explanation);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn')[q.correct].classList.add('correct');
    showFeedback(false,'❌ ખોટો જવાબ! '+q.explanation);
  }
  answered=true;
  document.getElementById('score-box').textContent=`Score: ${score} / 50`;
  document.getElementById('next-btn').className='next-btn show';
}

function checkAnswer(){
  const inp=document.getElementById('answer-input');
  const val=inp.value.trim();
  if(!val)return;
  const q=questions[current];
  const ok=val.toLowerCase()===q.correctWord.toLowerCase();
  inp.className='answer-input '+(ok?'correct':'wrong');
  if(ok && !answered) score++;
  showFeedback(ok, ok ? q.explanation : `❌ ખોટો જવાબ! સાચો: "${q.correctWord}"`);
  document.getElementById('check-btn').disabled=true;
  document.getElementById('score-box').textContent=`Score: ${score} / 50`;
  answered=true;
  document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');
  document.querySelectorAll('.option-btn')[q.correct].classList.add('correct');
  document.getElementById('next-btn').className='next-btn show';
}

function showFeedback(ok,msg){
  const fb=document.getElementById('feedback');
  fb.textContent=msg;
  fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
}

function nextQuestion(){
  current++;
  if(current>=50){
    const pct=Math.round(score/50*100);
    let emoji='😊',msg='સારો પ્રયાસ!';
    if(pct===100){emoji='🏆';msg='પરફેક્ટ સ્કોર!';}
    else if(pct>=80){emoji='🌟';msg='ઉત્કૃષ્ટ!';}
    else if(pct>=60){emoji='👍';msg='સારું!';}
    document.querySelector('.page-wrapper').innerHTML=`
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-size:72px;margin-bottom:20px;">${emoji}</div>
        <div style="font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:var(--dark);margin-bottom:8px;">Quiz પૂર્ણ!</div>
        <div style="font-size:18px;font-weight:600;color:var(--olive);margin-bottom:6px;">${msg}</div>
        <div style="font-size:15px;color:rgba(28,43,45,0.5);margin-bottom:36px;font-family:'DM Sans',sans-serif;">તમારો સ્કોર: ${score} / 50 (${pct}%)</div>
        <div style="background:#fff;border-radius:24px;padding:28px;margin-bottom:32px;box-shadow:0 4px 20px rgba(28,43,45,0.08);display:flex;justify-content:space-around;gap:8px;">
          <div><div style="font-family:'Fraunces',serif;font-size:40px;font-weight:900;color:#4A6741;">${score}</div><div style="font-size:12px;font-weight:600;color:rgba(28,43,45,0.45);text-transform:uppercase;letter-spacing:1px;margin-top:4px;">સાચા</div></div>
          <div style="width:1px;background:rgba(28,43,45,0.1);"></div>
          <div><div style="font-family:'Fraunces',serif;font-size:40px;font-weight:900;color:#C4622D;">${50-score}</div><div style="font-size:12px;font-weight:600;color:rgba(28,43,45,0.45);text-transform:uppercase;letter-spacing:1px;margin-top:4px;">ખોટા</div></div>
          <div style="width:1px;background:rgba(28,43,45,0.1);"></div>
          <div><div style="font-family:'Fraunces',serif;font-size:40px;font-weight:900;color:#D4A017;">${pct}%</div><div style="font-size:12px;font-weight:600;color:rgba(28,43,45,0.45);text-transform:uppercase;letter-spacing:1px;margin-top:4px;">સ્કોર</div></div>
        </div>
        <button onclick="location.reload()" style="background:#E8C547;color:#1C2B2D;border:none;border-radius:18px;padding:17px 48px;font-family:'Fraunces',serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(212,160,23,0.35);">ફરીથી રમો 🔄</button>
      </div>`;
    return;
  }
  const pw=document.querySelector('.page-wrapper');
  pw.style.opacity='0'; pw.style.transform='translateY(16px)'; pw.style.transition='all 0.28s ease';
  setTimeout(()=>{
    loadQuestion();
    pw.style.opacity='1'; pw.style.transform='translateY(0)';
  },280);
}

loadQuestion();
</script>
</body>
</html>
